
<!DOCTYPE html>
<html>
<head>
<title>A Question For You</title>

<style>
body{
text-align:center;
font-family:Arial;
margin-top:100px;
}

#yes{
padding:12px 25px;
font-size:20px;
margin-right:20px;
background-color:green;
color:white;
border:none;
border-radius:10px;
}

#no{
padding:12px 25px;
font-size:20px;
background-color:red;
color:white;
border:none;
border-radius:10px;
position:absolute;
}
</style>
</head>

<body>

<h1>Do you want to Marry Me? 😊</h1>

<button id="yes" onclick="yes()">YES</button>
<button id="no" onmouseover="move()">NO</button>

<script>

function yes(){
alert("Yay! You clicked YES 🎉");
}

function move(){
var x = Math.random() * window.innerWidth;
var y = Math.random() * window.innerHeight;

document.getElementById("no").style.left = x + "px";
document.getElementById("no").style.top = y + "px";
}

</script>

</body>
</html>
